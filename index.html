<!DOCTYPE html>
<html>
<head>
  <title>Reaction Game</title>
  <style>
    body { text-align: center; font-family: Arial; }
    #screen {
      width: 300px;
      height: 200px;
      background: gray;
      margin: 40px auto;
      line-height: 200px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>Reaction Test</h2>
<p id="msg">Wait for green...</p>
<div id="screen">WAIT</div>

<script>
  let startTime;
  const screen = document.getElementById("screen");
  const msg = document.getElementById("msg");

  setTimeout(() => {
    screen.style.background = "green";
    screen.textContent = "CLICK!";
    startTime = Date.now();
  }, Math.random() * 3000 + 1000);

  screen.onclick = () => {
    if (!startTime) return;
    let time = Date.now() - startTime;
    msg.textContent = "Reaction time: " + time + " ms";
    startTime = null;
  };
</script>

</body>
</html>
